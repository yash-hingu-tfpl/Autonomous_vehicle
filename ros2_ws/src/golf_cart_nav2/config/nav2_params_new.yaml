controller_server:
  ros__parameters:
    use_sim_time: False
    controller_plugins: ["FollowPath"]

    # Regulated Pure Pursuit is ideal for Ackermann/Golf Carts
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_velocity: 0.4
      lookahead_dist: 1.5       # Matches your original script
      min_lookahead_dist: 1.0
      max_lookahead_dist: 3.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: True
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      
      # Ackermann Specific Constraints
      use_collision_aware_linear_velocity_policy: True
      use_regulated_linear_velocity_scaling: True
      regulated_linear_velocity_scaling_multiplier: 0.75
      
      # This ensures the cart slows down if the steering angle is high
      use_cost_regulated_linear_velocity_scaling: True
      
      # Wheelbase and turning constraints
      min_radius: 4.5 # The minimum turning radius of your golf cart in meters

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: True
      allow_unknown: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: True
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 1.2 # Roughly half the width/length of the cart
      plugins: ["voxel_layer", "inflation_layer"]
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/color/points
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
        cost_scaling_factor: 3.0