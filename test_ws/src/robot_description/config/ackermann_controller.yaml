controller_manager:
  ros__parameters:
    update_rate: 50

    ackermann_cont:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ackermann_cont:
  ros__parameters:
    # Joint Names from your XACRO
    rear_wheel_names: ['rear_left_wheel_joint', 'rear_right_wheel_joint']
    front_steer_names: ['front_left_steer_joint', 'front_right_steer_joint']

    # Robot Geometry
    wheelbase: 0.5
    track_width: 0.4
    wheel_radius: 0.1

    # Topic Subscriptions
    publish_limited_velocity: true
    use_stamped_vel: false