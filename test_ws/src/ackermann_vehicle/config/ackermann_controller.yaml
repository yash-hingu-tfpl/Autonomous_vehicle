controller_manager:
  ros__parameters:
    update_rate: 50
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    ackermann_cont:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_cont:
  ros__parameters:
    # Plural 'wheels' is required in Humble
    rear_wheels_names: ["rear_left_wheel_joint", "rear_right_wheel_joint"]
    front_wheels_names: ["front_left_steer_joint", "front_right_steer_joint"]

    # Geometry parameters (Crucial: Humble expects these specific keys)
    wheelbase: 0.5
    front_wheel_track: 0.4
    rear_wheel_track: 0.4
    front_wheels_radius: 0.1
    rear_wheels_radius: 0.1

    # Controller behavior
    open_loop: true
    publish_rate: 50.0
    enable_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_footprint
    use_stamped_vel: false

joint_state_broadcaster:
  ros__parameters:
    # Adding this line tells the broadcaster to look for these joints 
    # and publish a '0' position if no one else is controlling them.
    extra_joints: ["front_left_wheel_joint", "front_right_wheel_joint"]