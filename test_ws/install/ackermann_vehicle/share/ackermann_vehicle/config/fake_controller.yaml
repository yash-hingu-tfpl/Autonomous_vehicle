controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController


ackermann_steering_controller:
  ros__parameters:

    # ===== Command handling =====
    cmd_vel_timeout: 1.0
    use_stamped_vel: false
    open_loop: false

    # ===== Steering model =====
    front_steering: true

    rear_wheels_names:
      - rear_left_wheel_joint
      - rear_right_wheel_joint

    front_wheels_names:
      - front_left_steering_joint
      - front_right_steering_joint

    velocity:
      max: 1.2
      min: 0.0

    # ===== Geometry (ALL REQUIRED IN HUMBLE) =====
    wheelbase: 2.30
    front_wheel_track: 1.005
    rear_wheel_track: 1.005

    wheel_radius: 0.23
    front_wheels_radius: 0.23
    rear_wheels_radius: 0.23

    # ===== Odometry =====
    base_frame_id: base_link
    # odom_frame_id: odom_ackerman
    odom_frame_id: odom

    # enable_odom_tf: true
    enable_odom_tf: false


    # ===== Tuning =====
    velocity_rolling_window_size: 10
    reduce_wheel_speed_until_steering_reached: true
