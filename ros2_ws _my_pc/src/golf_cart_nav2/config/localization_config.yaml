ekf_filter_node:
  ros__parameters:
    sensor_timeout: 0.1
    frequency: 20.0
    transform_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    print_diagnostics: true
    permit_corrected_publication: true
    predict_to_current_time: true
    history_length: 1.5

    # odom0: RTAB-Map Visual Odometry
    odom0: /visual_odom
    odom0_config: [true,  true,  false, 
                   false, false, true, 
                   false, false, false, 
                   false, false, false, 
                   false, false, false]
    odom0_relative: true

    # imu0: Madgwick Filtered IMU
    imu0: /camera/imu
    imu0_config: [false, false, false, 
                  true,  true,  true,  
                  false, false, false, 
                  true,  true,  true,  
                  false, false, false]
    imu0_relative: false