# =============================================================
# NAV2 OPTIMIZED CONFIG FOR GOLF CART (LOW LATENCY)
# =============================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    # default_bt_xml_filename: "navigate_w_recovery_and_replanning_only_if_path_becomes_invalid.xml"
    # plugin_lib_names:
    #   # - nav2_back_to_start_action_bt_node
    #   - nav2_recovery_node_bt_node
    #   - nav2_reconfigure_node_bt_node

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      minimum_turning_radius: 2.5   # Adjust to your cart's actual turning circle
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      analytic_expansion_ratio: 3.5

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
      
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5
      stateful: true
      
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.2
      max_linear_accel: 1.0
      max_linear_decel: 1.0
      lookahead_dist: 1.5
      min_lookahead_dist: 0.8
      max_lookahead_dist: 3.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: true
      min_turning_radius: 2.5
      use_regulated_linear_velocity_scaling: true
      use_collision_detection: true

# ===============================
# LOCAL COSTMAP (2D Obstacle Layer)
# ===============================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0      # Lowered to save CPU
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.1            # 10cm resolution is much faster than 5cm
      
      # Footprint for a standard golf cart (approx 2.4m long, 1.2m wide)
      # [x, y] coordinates of corners relative to base_link
      footprint: "[ [2.8, 0.7], [2.8, -0.7], [-0.5, -0.7], [-0.5, 0.7] ]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan            # Use LaserScan from depthimage_to_laserscan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 5.0
          raytrace_max_range: 10.0
          clearing: true
          marking: true
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8     # Distance from obstacles
        cost_scaling_factor: 3.0

# ===============================
# GLOBAL COSTMAP
# ===============================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      resolution: 0.1
      track_unknown_space: true
      
      # footprint: "[ [1.5, 0.7], [1.5, -0.7], [-1.5, -0.7], [-1.5, 0.7] ]"
      footprint: "[ [2.8, 0.7], [2.8, -0.7], [-0.5, -0.7], [-0.5, 0.7] ]"

      plugins: ["static_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 1.0
        cost_scaling_factor: 3.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    max_velocity: [1.5, 0.0, 1.0]
    min_velocity: [0.0, 0.0, -1.0]
    max_accel: [1.0, 0.0, 1.0]
    max_decel: [-1.0, 0.0, -1.0]

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false